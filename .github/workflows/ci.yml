name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build test container
        run: docker build -t victron-evse-test .

      - name: Run test container
        run: docker run --rm victron-evse-test
